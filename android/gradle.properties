# =========================
# Gradle Performance / JVM
# =========================
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Gradle behavior
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# =========================
# Kotlin (Fix daemon issues)
# =========================
kotlin.compiler.execution.strategy=in-process
kotlin.daemon.enabled=false

# =========================
# AndroidX / Jetifier
# =========================
android.useAndroidX=true
android.enableJetifier=true

# Optional: reduce resource processing load a bit
android.nonTransitiveRClass=true
android.defaults.buildfeatures.buildconfig=true